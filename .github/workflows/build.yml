name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (debug)
        run: ./gradlew assembleDebug

      - name: Rename APK for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/NMS-Guide-${{ github.ref_name }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nms-guide-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "NMS Guide ${{ github.ref_name }}"
          body: |
            ## 🚀 NMS Guide ${{ github.ref_name }}

            APK listo para descargar e instalar.

            ### 📥 Instalación
            1. Descarga el APK abajo
            2. En Android: Ajustes → Seguridad → Orígenes desconocidos
            3. Abre el archivo APK e instala
          files: app/build/outputs/apk/debug/NMS-Guide-*.apk
          makeLatest: true
