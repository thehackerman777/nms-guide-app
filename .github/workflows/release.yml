name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
          echo "storePassword=$KEYSTORE_PASSWORD" >> app/keystore.properties
          echo "keyPassword=$KEY_PASSWORD" >> app/keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> app/keystore.properties
          echo "storeFile=keystore.jks" >> app/keystore.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK (if keystore present)
        run: |
          if [ -f app/keystore.jks ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NMS Guide ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
